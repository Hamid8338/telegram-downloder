---
name: TG Downloader

on:
  workflow_dispatch:
    inputs:
      telegram_link:
        description: 'Telegram post URL'
        required: true
        type: string

jobs:
  tg-download:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install beautifulsoup4 requests
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg wget

      - name: Download media and text from Telegram
        run: |
          python scripts/download_telegram.py "${{ github.event.inputs.telegram_link }}"

      - name: Download linked files from post text
        run: |
          LINKS_FILE="downloads/extracted_links.txt"
          if [ -f "$LINKS_FILE" ]; then
            mkdir -p downloads/wget_files
            while IFS= read -r link; do
              [ -z "$link" ] && continue
              wget -q --no-check-certificate --timeout=30 -P downloads/wget_files "$link" || true
            done < "$LINKS_FILE"
          fi

      - name: Merge videos if multiple
        run: |
          python scripts/merge_videos.py

      - name: Commit files to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f downloads/
          if ! git diff --staged --quiet; then
            git commit -m "Download from: ${{ github.event.inputs.telegram_link }}"
            git push
          fi
